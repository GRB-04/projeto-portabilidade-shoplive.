server {
    listen 80;
    server_name localhost;

    # ── Root — Landing page ─────────────────────────────────
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ── Version A — Broken Mobile ───────────────────────────
    # [PORTABILITY ISSUE] This version will break on mobile browsers
    location /version-a/ {
        alias /usr/share/nginx/html/version-a/;
        try_files $uri $uri/ /version-a/index.html;
        add_header X-Version "A-Broken-Mobile" always;
    }

    # ── Version B — Fixed Responsive ────────────────────────
    # [PORTABILITY FIX] This version works correctly on all devices
    location /version-b/ {
        alias /usr/share/nginx/html/version-b/;
        try_files $uri $uri/ /version-b/index.html;
        add_header X-Version "B-Fixed-Responsive" always;
    }

    # ── Static asset caching ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
